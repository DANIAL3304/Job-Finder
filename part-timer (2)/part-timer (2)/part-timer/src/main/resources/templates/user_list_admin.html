<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background-color: white;
      padding: 40px;
      margin-top: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    table th, table td {
      vertical-align: middle;
      text-align: center;
    }

    thead {
      background: linear-gradient(to right, #343a40, #6c757d);
      color: #fff;
    }

    tbody tr:nth-of-type(odd) {
      background-color: #f8f9fa;
    }

    tbody tr:hover {
      background-color: #e2e6ea;
      cursor: pointer;
    }

    /* Slide animation */
    .slide-in {
      animation: slideIn 0.5s ease forwards;
    }


    /* Keyframes */
    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }




    .btn-sm {
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
    }

    h2 i {
      color: #343a40;
    }
  </style>


  <canvas id="bubbleCanvas"></canvas>

  <style>
    #bubbleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1; /* Behind everything including navbar */
      width: 100%;
      height: 100%;
    }
  </style>

  <script>
    const canvas = document.getElementById("bubbleCanvas");
    const ctx = canvas.getContext("2d");

    const NAVBAR_HEIGHT = 80;
    const NUM_BUBBLES = 15;
    const bubbles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Bubble {
      constructor() {
        this.radius = Math.random() * 60 + 30;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = Math.random() * (canvas.height - NAVBAR_HEIGHT - this.radius * 2) + this.radius + NAVBAR_HEIGHT;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
      }

      draw() {
        const gradient = ctx.createLinearGradient(this.x - this.radius, this.y - this.radius, this.x + this.radius, this.y + this.radius);
        gradient.addColorStop(0, '#00ffe5');
        gradient.addColorStop(1, '#ff00e5');

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.globalAlpha = 0.2; // soft transparency
        ctx.fill();
        ctx.globalAlpha = 1.0; // reset alpha
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // Wall collision
        if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.vx *= -1;
        if (this.y + this.radius > canvas.height || this.y - this.radius < NAVBAR_HEIGHT) this.vy *= -1;

        // Smooth bubble collision
        for (let other of bubbles) {
          if (other === this) continue;
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const minDist = this.radius + other.radius;

          if (distance < minDist) {
            // Calculate angle, sine, cosine
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);

            // Rotate this bubble's velocity
            const v1 = { x: this.vx * cos + this.vy * sin, y: this.vy * cos - this.vx * sin };
            const v2 = { x: other.vx * cos + other.vy * sin, y: other.vy * cos - other.vx * sin };

            // Swap x velocities for 1D elastic collision
            [v1.x, v2.x] = [v2.x, v1.x];

            // Rotate velocities back
            this.vx = v1.x * cos - v1.y * sin;
            this.vy = v1.y * cos + v1.x * sin;
            other.vx = v2.x * cos - v2.y * sin;
            other.vy = v2.y * cos + v2.x * sin;

            // Push them apart
            const overlap = 0.5 * (minDist - distance + 1);
            const offsetX = overlap * cos;
            const offsetY = overlap * sin;
            this.x -= offsetX;
            this.y -= offsetY;
            other.x += offsetX;
            other.y += offsetY;
          }
        }

        this.draw();
      }

    }

    // Generate bubbles
    for (let i = 0; i < NUM_BUBBLES; i++) {
      bubbles.push(new Bubble());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let b of bubbles) {
        b.update();
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</head>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg ">
  <div class="container-fluid bg-white">
    <a class="navbar-brand fw-bold" href="#">JobFinder</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" href="/admin">Home</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menu</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/admin/job_list_admin">Job</a></li>
            <li><a class="dropdown-item" href="/admin/company_list_admin">Company</a></li>
            <li><a class="dropdown-item" href="/admin/user_list_admin">User</a></li>
          </ul>
        </li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-flex ms-auto">
        <button type="submit" class="btn btn-outline-danger">Logout</button>
      </form>
    </div>
  </div>
</nav>
<body class="bg-light">


<div class="container mt-5 slide-in ">


  <!-- Header with Back Button -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Registered Users</h2>
    <a href="/admin" class="btn btn-secondary">Back to Admin</a>
  </div>


  <!-- Add User Button -->
  <div class="mb-3">
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addUserModal">
      Add User
    </button>
  </div>


  <!-- User Table -->
  <table class="table table-bordered table-striped shadow-sm bg-white">
    <thead class="table-dark">
    <tr>
      <th>User ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone No</th>
      <th>Role</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
      <td th:text="${user.userId}">1</td>
      <td th:text="${user.name}">Alice</td>
      <td th:text="${user.email}">alice@example.com</td>
      <td th:text="${user.phoneNo}">1234567890</td>
      <td th:text="${user.role}">USER</td>
      <td>
        <!-- Edit Button -->
        <button class="btn btn-sm btn-primary"
                data-bs-toggle="modal"
                th:attr="data-bs-target='#editModal__' + ${user.userId}">
          Edit
        </button>


        <!-- Delete Link -->
        <a th:href="@{'/admin/delete-user/' + ${user.userId}}"
           onclick="return confirm('Are you sure you want to delete this user?')"
           class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>


<!-- Edit User Modals -->
<div th:each="user : ${users}">
  <div class="modal fade" th:id="'editModal__' + ${user.userId}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form th:action="@{/admin/update-user}" method="post">
          <div class="modal-header">
            <h5 class="modal-title">Edit User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="userId" th:value="${user.userId}"/>


            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" name="name" th:value="${user.name}" required>
            </div>


            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" th:value="${user.email}" required>
            </div>


            <div class="mb-3">
              <label class="form-label">Phone No</label>
              <input type="text" class="form-control" name="phoneNo" th:value="${user.phoneNo}" required>
            </div>


            <div class="mb-3">
              <label class="form-label">Role</label>
              <select class="form-select" name="role">
                <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-success">Save Changes</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>


<!-- Add User Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form th:action="@{/admin/add-user}" method="post">
        <div class="modal-header">
          <h5 class="modal-title">Add New User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">


          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>


          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>


          <div class="mb-3">
            <label class="form-label">Phone No</label>
            <input type="text" class="form-control" name="phoneNo" required>
          </div>


          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>


          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" name="role">
              <option value="USER">USER</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>


        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Add User</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
