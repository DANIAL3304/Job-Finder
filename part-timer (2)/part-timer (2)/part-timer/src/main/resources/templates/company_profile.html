<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Company Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
      padding-top: 70px;
    }
    .navbar {
      background-color: white;
      border-bottom: 1px solid #ddd;
    }
    .navbar-brand, .nav-link {
      color: #333 !important;
      font-weight: 600;
    }
    .form-container {
      background-color: #fff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
      margin: 30px auto;
      max-width: 800px;
    }
    .form-label {
      font-weight: 600;
    }
    .btn-save {
      float: right;
    }
  </style>

  <canvas id="bubbleCanvas"></canvas>
  <style>
    #bubbleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
    }
  </style>

  <script>
    const canvas = document.getElementById("bubbleCanvas");
    const ctx = canvas.getContext("2d");

    const NAVBAR_HEIGHT = 80;
    const NUM_BUBBLES = 15;
    const bubbles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Bubble {
      constructor() {
        this.radius = Math.random() * 60 + 30;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = Math.random() * (canvas.height - NAVBAR_HEIGHT - this.radius * 2) + this.radius + NAVBAR_HEIGHT;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
      }

      draw() {
        const gradient = ctx.createLinearGradient(this.x - this.radius, this.y - this.radius, this.x + this.radius, this.y + this.radius);
        gradient.addColorStop(0, '#00ffe5');
        gradient.addColorStop(1, '#ff00e5');
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.globalAlpha = 0.2;
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.vx *= -1;
        if (this.y + this.radius > canvas.height || this.y - this.radius < NAVBAR_HEIGHT) this.vy *= -1;

        for (let other of bubbles) {
          if (other === this) continue;
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const minDist = this.radius + other.radius;

          if (distance < minDist) {
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);
            const v1 = { x: this.vx * cos + this.vy * sin, y: this.vy * cos - this.vx * sin };
            const v2 = { x: other.vx * cos + other.vy * sin, y: other.vy * cos - other.vx * sin };
            [v1.x, v2.x] = [v2.x, v1.x];
            this.vx = v1.x * cos - v1.y * sin;
            this.vy = v1.y * cos + v1.x * sin;
            other.vx = v2.x * cos - v2.y * sin;
            other.vy = v2.y * cos + v2.x * sin;
            const overlap = 0.5 * (minDist - distance + 1);
            const offsetX = overlap * cos;
            const offsetY = overlap * sin;
            this.x -= offsetX;
            this.y -= offsetY;
            other.x += offsetX;
            other.y += offsetY;
          }
        }
        this.draw();
      }
    }

    for (let i = 0; i < NUM_BUBBLES; i++) {
      bubbles.push(new Bubble());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let b of bubbles) {
        b.update();
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand ms-3" href="#">JobFinder</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav me-3">
        <li class="nav-item">
          <a class="nav-link" href="/company">Home</a>
        </li>
        <li class="nav-item">
          <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-outline-danger">Logout</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Form -->
<div class="container">
  <div class="form-container">
    <h3 class="mb-4 text-center"><i class="fas fa-building me-2"></i>Edit Company Profile</h3>

    <form th:action="@{/company/profile/save}" method="post" th:object="${company}" onsubmit="return validateForm()" novalidate>

      <!-- CSRF + ID -->
      <input type="hidden" th:field="*{companyId}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="mb-3">
        <label for="companyName" class="form-label">Company Name</label>
        <input type="text" th:field="*{name}" id="companyName" class="form-control" required>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="companyEmail" class="form-label">Email</label>
          <input type="email" th:field="*{email}" id="companyEmail" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label for="companyPhone" class="form-label">Phone</label>
          <input type="text" th:field="*{phone}" id="companyPhone" class="form-control">
        </div>
      </div>

      <div class="mb-3">
        <label for="companyLocation" class="form-label">Address</label>
        <input type="text" th:field="*{location}" id="companyLocation" class="form-control">
      </div>

      <div class="mb-4">
        <label for="companyDescription" class="form-label">Description</label>
        <textarea th:field="*{description}" id="companyDescription" class="form-control" rows="4"></textarea>
      </div>

      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>

      <!-- Success Message -->
      <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show mt-4" role="alert">
        <strong>Profile updated successfully!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </form>
  </div>
</div>

<!-- JavaScript -->
<script>
  function validateForm() {
    const name = document.getElementById("companyName").value;
    const email = document.getElementById("companyEmail").value;
    if (name.trim() === "" || email.trim() === "") {
      alert("Company name and email are required.");
      return false;
    }
    return true;
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
