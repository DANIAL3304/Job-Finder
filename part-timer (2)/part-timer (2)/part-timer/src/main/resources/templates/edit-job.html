<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Job</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-container {
      background-color: #fff;
      padding: 30px;
      margin-top: 60px;
      border-radius: 10px;
      box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
      max-width: 700px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="form-container mx-auto">
    <h2 class="mb-4">Edit Job Posting</h2>

    <div th:if="${success}" class="alert alert-success" role="alert">
      <span th:text="${success}">Job updated successfully!</span>
    </div>

    <form th:action="@{/company/update-job}" th:object="${job}" method="post">
      <input type="hidden" th:field="*{jobId}"/>

      <div class="mb-3">
        <label class="form-label">Job Title</label>
        <input type="text" th:field="*{name}" class="form-control" required/>
      </div>

      <div class="mb-3">
        <label class="form-label">Location</label>
        <input type="text" th:field="*{location}" class="form-control" required/>
      </div>

      <div class="mb-3">
        <label class="form-label">Salary (RM)</label>
        <input type="number" th:field="*{salary}" step="0.01" class="form-control" required/>
      </div>

      <div class="mb-3">
        <label class="form-label">Job Type</label>
        <select th:field="*{jobType}" class="form-select" required>
          <option value="Part-Time">Part-Time</option>
          <option value="Internship">Internship</option>
          <option value="Freelance">Freelance</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea th:field="*{description}" class="form-control" rows="5" required></textarea>
      </div>

      <div class="d-flex justify-content-between">
        <a href="/company" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Update Job</button>
      </div>
    </form>
  </div>
</div>

</body>
</html>
