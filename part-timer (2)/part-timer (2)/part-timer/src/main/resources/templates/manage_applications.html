<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Manage Applications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
      padding-top: 70px;
    }
    .navbar {
      background-color: white;
      border-bottom: 1px solid #ddd;
    }
    .navbar-brand, .nav-link {
      color: #333 !important;
      font-weight: 600;
    }
    .table-container {
      background-color: #fff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
      margin: 30px auto;
      max-width: 1100px;
    }
    .table thead {
      background-color: #007bff;
      color: #fff;
    }
    .table tbody tr:hover {
      background-color: #f2f2f2;
    }
    .badge {
      font-size: 0.9rem;
      padding: 0.5em 0.75em;
    }
    .btn-sm {
      padding: 0.25rem 0.5rem;
    }
  </style>
  <canvas id="bubbleCanvas"></canvas>

  <style>
    #bubbleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1; /* Behind everything including navbar */
      width: 100%;
      height: 100%;
    }
  </style>

  <script>
    const canvas = document.getElementById("bubbleCanvas");
    const ctx = canvas.getContext("2d");

    const NAVBAR_HEIGHT = 80;
    const NUM_BUBBLES = 15;
    const bubbles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Bubble {
      constructor() {
        this.radius = Math.random() * 60 + 30;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = Math.random() * (canvas.height - NAVBAR_HEIGHT - this.radius * 2) + this.radius + NAVBAR_HEIGHT;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
      }

      draw() {
        const gradient = ctx.createLinearGradient(this.x - this.radius, this.y - this.radius, this.x + this.radius, this.y + this.radius);
        gradient.addColorStop(0, '#00ffe5');
        gradient.addColorStop(1, '#ff00e5');

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.globalAlpha = 0.2; // soft transparency
        ctx.fill();
        ctx.globalAlpha = 1.0; // reset alpha
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // Wall collision
        if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.vx *= -1;
        if (this.y + this.radius > canvas.height || this.y - this.radius < NAVBAR_HEIGHT) this.vy *= -1;

        // Smooth bubble collision
        for (let other of bubbles) {
          if (other === this) continue;
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const minDist = this.radius + other.radius;

          if (distance < minDist) {
            // Calculate angle, sine, cosine
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);

            // Rotate this bubble's velocity
            const v1 = { x: this.vx * cos + this.vy * sin, y: this.vy * cos - this.vx * sin };
            const v2 = { x: other.vx * cos + other.vy * sin, y: other.vy * cos - other.vx * sin };

            // Swap x velocities for 1D elastic collision
            [v1.x, v2.x] = [v2.x, v1.x];

            // Rotate velocities back
            this.vx = v1.x * cos - v1.y * sin;
            this.vy = v1.y * cos + v1.x * sin;
            other.vx = v2.x * cos - v2.y * sin;
            other.vy = v2.y * cos + v2.x * sin;

            // Push them apart
            const overlap = 0.5 * (minDist - distance + 1);
            const offsetX = overlap * cos;
            const offsetY = overlap * sin;
            this.x -= offsetX;
            this.y -= offsetY;
            other.x += offsetX;
            other.y += offsetY;
          }
        }

        this.draw();
      }

    }

    // Generate bubbles
    for (let i = 0; i < NUM_BUBBLES; i++) {
      bubbles.push(new Bubble());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let b of bubbles) {
        b.update();
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand ms-3" href="#">JobFinder</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav me-3">
        <li class="nav-item">
          <a class="nav-link" href="/company">Home</a>
        </li>

        <li class="nav-item">
          <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-outline-danger">Logout</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container">
  <div class="table-container">
    <h3 class="mb-4 text-center">Manage Job Applications</h3>
    <table class="table table-hover align-middle">
      <thead>
      <tr>
        <th>Applicant Name</th>
        <th>Email</th>
        <th>Job Title</th>
        <th>Date Applied</th>
        <th>Status</th>
        <th class="text-center">Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="app : ${applications}">
        <td th:text="${app.user.name}">Applicant Name</td>
        <td th:text="${app.user.email}">Email</td>
        <td th:text="${app.job.name}">Job Title</td>
        <td th:text="${#temporals.format(app.applicationDate, 'dd MMM yyyy')}">Date</td>
        <td>
            <span class="badge"
                  th:classappend="' ' + (
                    ${app.status} == 'APPROVED' ? 'bg-success' :
                    (${app.status} == 'REJECTED' ? 'bg-danger' : 'bg-secondary'))"
                  th:text="${app.status}">
              Status
            </span>
        </td>
        <td class="text-center">
          <form th:action="@{/company/application/{id}/update(id=${app.applicationId})}" method="post" class="d-inline">
            <input type="hidden" name="status" value="ACCEPTED">
            <button class="btn btn-success btn-sm me-1" type="submit">Accept</button>
          </form>
          <form th:action="@{/company/application/{id}/update(id=${app.applicationId})}" method="post" class="d-inline">
            <input type="hidden" name="status" value="REJECTED">
            <button class="btn btn-danger btn-sm" type="submit">Reject</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
