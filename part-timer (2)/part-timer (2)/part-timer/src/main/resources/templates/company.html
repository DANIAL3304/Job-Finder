<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Company Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }

        .navbar { background-color: white; border-bottom: 1px solid #ddd; }
        .navbar-brand, .nav-link { color: #333 !important; font-weight: 600; }

        .sidebar {
            height: 100vh; background-color: white; border-right: 1px solid #ddd;
            padding-top: 60px; position: fixed; width: 220px; top: 0; left: 0;
        }

        .sidebar a {
            display: block; padding: 15px 20px; color: #333;
            text-decoration: none; font-weight: 500;
        }

        .sidebar a:hover { background-color: #f0f0f0; color: #007bff; }

        .main-content { margin-left: 220px; padding: 2rem; padding-top: 80px; }

        .card {
            border-radius: 10px; border: none; margin-bottom: 30px;
            box-shadow: 0 0.46875rem 2.1875rem rgba(90,97,105,0.1),
            0 0.9375rem 1.40625rem rgba(90,97,105,0.1),
            0 0.25rem 0.53125rem rgba(90,97,105,0.12),
            0 0.125rem 0.1875rem rgba(90,97,105,0.1);
        }

        .card-statistic-3 {
            position: relative; /* Keep icons inside */
            overflow: hidden;
        }

        .card-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0.08;
            font-size: 90px;
            line-height: 1;
            z-index: 0;
            color: #000;
        }

        .card-icon-large .fas {
            font-size: 110px;
        }

        .l-bg-cherry { background: linear-gradient(to right, #493240, #f09) !important; color: #fff; }
        .l-bg-blue-dark { background: linear-gradient(to right, #373b44, #4286f4) !important; color: #fff; }
        .l-bg-green-dark { background: linear-gradient(to right, #0a504a, #38ef7d) !important; color: #fff; }
        .l-bg-orange { background: linear-gradient(to right, #f9900e, #ffba56) !important; }
        .l-bg-green { background: linear-gradient(135deg, #23bdb8 0%, #43e794 100%) !important; }
        .l-bg-cyan { background: linear-gradient(135deg, #289cf5, #84c0ec) !important; }

        .form-container {
            background-color: #fff; border-radius: 8px; padding: 30px;
            box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); margin-bottom: 2rem;
        }

        .table-container {
            background-color: #fff; border-radius: 8px; padding: 20px;
            box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
        }

        .table thead { background-color: #007bff; color: #fff; }
        .table tbody tr:hover { background-color: #f2f2f2; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-top: 100px; }
        }
    </style>
</head>
<body>
<!-- Background SVG Animation -->
<div style="position: fixed; z-index: -1; top: 0; left: 0; width: 100%; height: 100%;">
    <svg width="100%" height="100%">
        <defs>
            <linearGradient id="brightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00ffe5" />
                <stop offset="100%" stop-color="#ff00e5" />
            </linearGradient>
        </defs>
        <circle cx="15%" cy="25%" r="180" fill="url(#brightGradient)" opacity="0.25">
            <animate attributeName="cx" values="15%;85%;15%" dur="25s" repeatCount="indefinite" />
        </circle>
        <circle cx="80%" cy="70%" r="140" fill="url(#brightGradient)" opacity="0.2">
            <animate attributeName="cy" values="70%;30%;70%" dur="30s" repeatCount="indefinite" />
        </circle>
    </svg>
</div>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand ms-3" href="#">JobFinder</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto me-3">
                <li class="nav-item"><a class="nav-link" href="/company">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/company/aboutCompany">About</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-flex ms-auto">
                        <button type="submit" class="btn btn-outline-danger">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
    <a href="#"><i class="fas fa-home me-2"></i> Dashboard</a>
    <a th:href="@{'/company/profile/' + ${companyId}}"><i class="fas fa-building me-2"></i> Company Profile</a>
    <a href="/company/post-job"><i class="fas fa-plus me-2"></i> Post Job</a>
    <a href="/company/manage-applications"><i class="fas fa-envelope me-2"></i> Manage Applications</a>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="container-fluid">
        <!-- Top Cards -->
        <div class="row">
            <!-- Edit Profile Card -->
            <div class="col-xl-6 col-lg-6 mb-4">
                <a th:href="@{'/company/profile/' + ${companyId}}" class="text-decoration-none text-dark">
                    <div class="card l-bg-cherry">
                        <div class="card-statistic-3 p-4">
                            <div class="card-icon card-icon-large mb-3">
                                <i class="fas fa-user-edit"></i>
                            </div>
                            <h5 class="card-title mb-2">Edit Profile</h5>
                            <div class="row align-items-center mb-2">
                                <div class="col-8">
                                    <h2 class="mb-0 text-white">Active</h2>
                                </div>
                            </div>
                            <p class="mb-0">Update your company profile now anytime!</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Posted Jobs Card -->
            <div class="col-xl-6 col-lg-6 mb-4">
                <div class="card l-bg-blue-dark">
                    <div class="card-statistic-3 p-4">
                        <div class="card-icon card-icon-large mb-3">
                            <i class="fas fa-briefcase"></i>
                        </div>
                        <h5 class="card-title mb-2">Posted Jobs</h5>
                        <div class="row align-items-center mb-2">
                            <div class="col-8">
                                <h2 class="mb-0 text-white" th:text="${jobCount} + ' Listings'">12 Listings</h2>
                            </div>
                            <div class="col-4 text-end">
                                <span th:text="'+' + ${jobCount}" class="text-white">+3 <i class="fa fa-arrow-up"></i></span>
                            </div>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar l-bg-green" th:style="'width:' + (${jobCount} * 10) + '%'"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Job Table -->
        <div class="table-container mt-4">
            <h4 class="mb-3">Your Posted Jobs</h4>
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Location</th>
                    <th>Time</th>
                    <th>Salary</th>
                    <th>Date Posted</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}">
                    <form th:action="@{/company/update-job}" method="post" th:object="${job}">
                        <input type="hidden" name="jobId" th:value="*{jobId}" />
                        <input type="hidden" name="company.companyId" th:value="*{company.companyId}" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <td><input type="text" name="name" class="form-control" th:value="*{name}" required /></td>
                        <td><input type="text" name="description" class="form-control" th:value="*{description}" required /></td>
                        <td><input type="text" name="jobType" class="form-control" th:value="*{jobType}" required /></td>
                        <td><input type="text" name="location" class="form-control" th:value="*{location}" required /></td>
                        <td><input type="text" name="time" class="form-control" th:value="*{time}" required /></td>
                        <td><input type="number" name="salary" class="form-control" th:value="*{salary}" step="0.01" required /></td>
                        <td><input type="date" name="date" class="form-control"
                                   th:value="${#temporals.format(job.date, 'yyyy-MM-dd')}" required /></td>
                        <td>
                            <div class="d-flex gap-2">
                                <!-- Save Form -->
                                <form th:action="@{/company/update-job}" method="post" th:object="${job}">
                                    <input type="hidden" name="jobId" th:value="*{jobId}" />
                                    <input type="hidden" name="company.companyId" th:value="*{company.companyId}" />
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-success">Save</button>
                                </form>

                                <!-- Delete Form -->
                                <form th:action="@{/company/delete-job}" method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this job?');">
                                    <input type="hidden" name="jobId" th:value="${job.jobId}" />
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </div>
                        </td>

                </tr>
                </tbody>
            </table>
        </div>

        <script th:if="${jobUpdateSuccess}">
            alert("Job updated successfully!");
        </script>
    </div>
</div>
</body>
</html>
