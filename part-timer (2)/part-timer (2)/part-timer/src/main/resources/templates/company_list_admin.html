<canvas id="bubbleCanvas"></canvas>

<style>
    #bubbleCanvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1; /* Behind everything including navbar */
        width: 100%;
        height: 100%;
    }
</style>

<script>
    const canvas = document.getElementById("bubbleCanvas");
    const ctx = canvas.getContext("2d");

    const NAVBAR_HEIGHT = 80;
    const NUM_BUBBLES = 15;
    const bubbles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Bubble {
        constructor() {
            this.radius = Math.random() * 60 + 30;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = Math.random() * (canvas.height - NAVBAR_HEIGHT - this.radius * 2) + this.radius + NAVBAR_HEIGHT;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
        }

        draw() {
            const gradient = ctx.createLinearGradient(this.x - this.radius, this.y - this.radius, this.x + this.radius, this.y + this.radius);
            gradient.addColorStop(0, '#00ffe5');
            gradient.addColorStop(1, '#ff00e5');

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.globalAlpha = 0.2; // soft transparency
            ctx.fill();
            ctx.globalAlpha = 1.0; // reset alpha
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Wall collision
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.vx *= -1;
            if (this.y + this.radius > canvas.height || this.y - this.radius < NAVBAR_HEIGHT) this.vy *= -1;

            // Smooth bubble collision
            for (let other of bubbles) {
                if (other === this) continue;
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const minDist = this.radius + other.radius;

                if (distance < minDist) {
                    // Calculate angle, sine, cosine
                    const angle = Math.atan2(dy, dx);
                    const sin = Math.sin(angle);
                    const cos = Math.cos(angle);

                    // Rotate this bubble's velocity
                    const v1 = { x: this.vx * cos + this.vy * sin, y: this.vy * cos - this.vx * sin };
                    const v2 = { x: other.vx * cos + other.vy * sin, y: other.vy * cos - other.vx * sin };

                    // Swap x velocities for 1D elastic collision
                    [v1.x, v2.x] = [v2.x, v1.x];

                    // Rotate velocities back
                    this.vx = v1.x * cos - v1.y * sin;
                    this.vy = v1.y * cos + v1.x * sin;
                    other.vx = v2.x * cos - v2.y * sin;
                    other.vy = v2.y * cos + v2.x * sin;

                    // Push them apart
                    const overlap = 0.5 * (minDist - distance + 1);
                    const offsetX = overlap * cos;
                    const offsetY = overlap * sin;
                    this.x -= offsetX;
                    this.y -= offsetY;
                    other.x += offsetX;
                    other.y += offsetY;
                }
            }

            this.draw();
        }

    }

    // Generate bubbles
    for (let i = 0; i < NUM_BUBBLES; i++) {
        bubbles.push(new Bubble());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let b of bubbles) {
            b.update();
        }
        requestAnimationFrame(animate);
    }

    animate();
</script>


<!-- Main Content with Slide -->
<div class="container mt-5 slide-in ">

<!-- Slide Transition Script -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const links = document.querySelectorAll("a[href^='/admin']");

        links.forEach(link => {
            link.addEventListener("click", function (e) {
                e.preventDefault();
                const targetUrl = this.getAttribute("href");

                const content = document.querySelector('.slide-in');
                if (content) {
                    content.classList.remove('slide-in');
                    content.classList.add('slide-out');

                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 400);
                } else {
                    window.location.href = targetUrl;
                }
            });
        });
    });

    // ✅ Add this block to trigger slide-in after Back button
    window.addEventListener("pageshow", function (event) {
        const content = document.querySelector(".container");
        if (event.persisted && content) {
            content.classList.remove("slide-in"); // reset
            void content.offsetWidth; // trigger reflow
            content.classList.add("slide-out"); // animate again
        }
    });
</script>
<script>
    window.addEventListener('pageshow', function (event) {
        if (event.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") {
            window.location.reload();
        }
    });
</script>
