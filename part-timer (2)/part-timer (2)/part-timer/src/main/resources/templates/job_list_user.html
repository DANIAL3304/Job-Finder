<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }

        .card {
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card-title {
            font-weight: bold;
        }
    </style>
</head>
<body class="container mt-5">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand ms-3 fw-bold" href="#">JobFinder</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto me-3">
                <li class="nav-item">
                    <a class="nav-link fw-bold" href="/user">Home</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-flex">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-danger">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="mt-5 pt-5">
    <h2 class="mb-4">Available Jobs</h2>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <div class="col-md-12" th:each="job : ${jobs}">
            <div class="card p-3">
                <div class="row">
                    <div class="col-md-9">
                        <h5 class="card-title" th:text="${job.name} + ' (' + ${job.jobType} + ')'"></h5>
                        <p class="card-text mb-1"><strong>Company:</strong> <span th:text="${job.company.name}">Company Name</span></p>
                        <p class="card-text mb-1"><strong>Location:</strong> <span th:text="${job.location}"></span></p>
                        <p class="card-text mb-1"><strong>Salary:</strong> RM<span th:text="${job.salary}"></span></p>
                        <p class="card-text mb-1"><strong>Time:</strong> <span th:text="${job.time}"></span></p>
                        <p class="card-text"><strong>Description:</strong> <span th:text="${job.description}"></span></p>
                    </div>
                    <div class="col-md-3 d-flex align-items-center justify-content-end">
                        <form th:action="@{/job/apply/{id}(id=${job.jobId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-success"
                                    th:disabled="${appliedJobIds.contains(job.jobId)}">
                                <span th:text="${appliedJobIds.contains(job.jobId)} ? 'Applied' : 'Apply'"></span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
